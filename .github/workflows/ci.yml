name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Syntax gate (byte-compile all sources)
        run: python -m compileall -q .

      - name: Run tests
        # test_po_revision.py is a stale manual script that asserts the old
        # "PO email immediately restocks on-hand" behavior; POs now flow through
        # on-order -> arrival, so it is intentionally excluded pending a rewrite.
        run: >
          python -m pytest -q
          test_on_order_dedup.py
          test_cheney_inventory_report.py
          test_usfoods_inventory_report.py
          test_scan_health.py
          test_planning_config.py

  # Deterministic deploy: trigger Render via a Deploy Hook once tests pass,
  # instead of relying on Render's GitHub auto-deploy webhook (which has been
  # delivering late / dropping pushes). Dormant until the RENDER_DEPLOY_HOOK_URL
  # repo secret is set (Render dashboard -> the service -> Settings -> Deploy Hook).
  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy (if hook configured)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK" ]; then
            # Pin the exact commit: a bare hook deploys Render's (sometimes
            # stale) cached branch tip, so always pass ref=<this commit SHA>.
            curl -fsS "$HOOK&ref=$GITHUB_SHA" >/dev/null && echo "Render deploy triggered for $GITHUB_SHA."
          else
            echo "RENDER_DEPLOY_HOOK_URL not set - skipping CI-driven deploy."
            echo "Add it under repo Settings -> Secrets and variables -> Actions"
            echo "to deploy automatically after tests pass."
          fi
