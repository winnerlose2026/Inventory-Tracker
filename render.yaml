# Render Blueprint — source of truth for the bagel-inventory web service,
# the 6-hourly mailbox scan cron, and the 15-minute SFTP pull cron.
#
# Adoption: open Render -> Blueprints -> New Blueprint Instance, point it
# at this repo on branch `main`. For each service Render will detect the
# matching existing service by name and offer to adopt it rather than
# create a duplicate (web=bagel-inventory, crons=bagel-inventory-6h-scan
# and bagel-inventory-sftp-pull). After adoption, any commit to main that
# touches render.yaml auto-syncs to the dashboard.
#
# Why each piece exists:
#   - Web service: serves the Flask app + dashboard, persists inventory.json
#     and usage.json on the mounted disk.
#   - 6h-scan cron: scripts/cowork_graph_scan.py talks to Microsoft Graph
#     directly, fetches PO PDFs from JD@/info@, parses out-of-process, and
#     POSTs to /api/email/ingest-events. Out-of-process so the gunicorn
#     worker isn't blocked on big attachment fetches.
#   - sftp-pull cron: pulls distributor CSVs from sftp.hhbagels.com.
#
# Secrets (sync:false) are NOT carried in this file. Set them once on
# each service in the dashboard; Render preserves them across blueprint
# re-syncs. Only non-secret values (schedules, mailbox list, etc.) live
# here.

services:
  - type: web
    name: bagel-inventory
    runtime: python
    plan: starter
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --timeout 180 --bind 0.0.0.0:$PORT app:app
    disk:
      name: inventory-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: INVENTORY_API_TOKEN
        sync: false
      - key: MS365_TENANT_ID
        sync: false
      - key: MS365_CLIENT_ID
        sync: false
      - key: MS365_CLIENT_SECRET
        sync: false
      - key: MS365_USER
        sync: false
      - key: MS365_FOLDER
        value: Inbox
      - key: PO_LEAD_DAYS
        value: "30"

  - type: cron
    name: bagel-inventory-6h-scan
    runtime: python
    plan: starter
    branch: main
    # Every 6 hours, on the hour (UTC). Runs at 00, 06, 12, 18 UTC every
    # day. Covers U.S. business hours year-round regardless of daylight
    # saving (a fixed UTC cron drifts an hour against local time twice a
    # year, which is fine for an order-ingestion scan).
    #
    # The cowork_graph_scan.py script talks to Microsoft Graph directly using
    # the same MS365_* client-credentials that the web service uses, fetches
    # PO PDFs from the JD@ and info@ mailboxes, parses them out-of-process,
    # and POSTs the resulting events to /api/email/ingest-events on the web
    # service. PO-revision idempotency in sync_inventory means re-scanning
    # the same message (or a stale revision) cannot double-count the
    # on_order column; the per-cron-container .cowork_seen_ids.txt is a
    # nice-to-have message-level shortcut but is not required for safety.
    #
    # cowork_graph_scan.py imports integrations.email_scanner (which pulls
    # in pypdf for PDF parsing), so the cron service needs the full
    # requirements.txt installed in its build.
    schedule: "0 */6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/cowork_graph_scan.py --lookback-hours 24
    envVars:
      - key: APP_URL
        sync: false  # set to https://<your-service>.onrender.com
      - key: INVENTORY_API_TOKEN
        sync: false
      - key: MS365_TENANT_ID
        sync: false
      - key: MS365_CLIENT_ID
        sync: false
      - key: MS365_CLIENT_SECRET
        sync: false
      - key: MAILBOXES
        value: JD@ms.hhbagels.com,info@ms.hhbagels.com

  - type: cron
    name: bagel-inventory-sftp-pull
    runtime: python
    plan: starter
    branch: main
    # Pull distributor CSVs from the FTPS inbox (cPanel-hosted at
    # sftp.hhbagels.com) every 15 minutes. Files we've already processed
    # are tracked locally in data/sftp_cursor.json (cron-container-local,
    # ephemeral) and ALSO moved into processed/ on the FTPS host so we
    # see them server-side too. Re-ingestion safety is additionally
    # guaranteed by the PO revision-replace logic on the receiving end.
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/pull_sftp_inbox.py
    envVars:
      - key: APP_URL
        sync: false  # https://bagel-inventory.onrender.com
      - key: INVENTORY_API_TOKEN
        sync: false
      - key: SFTP_HOST
        value: sftp.hhbagels.com
      - key: SFTP_PORT
        value: "21"
      - key: SFTP_USERNAME_USFOODS
        sync: false
      - key: SFTP_PASSWORD_USFOODS
        sync: false
      - key: SFTP_USERNAME_CHENEY
        sync: false
      - key: SFTP_PASSWORD_CHENEY
        sync: false
      - key: SFTP_INCOMING_DIR
        value: incoming
      - key: SFTP_PROCESSED_DIR
        value: processed
