# Render Blueprint — source of truth for the Inventory-Tracker family:
# the bagel-inventory web service plus the 6-hour mailbox-scan cron.
#
# In-process daily jobs: the two lightweight daily jobs that used to be their
# own cron services — the forecast decrement (was 05:05 UTC) and the Graph
# subscription renew (was 09:00 UTC) — now run INSIDE the web service via
# scheduler.py, which gunicorn starts once from its arbiter (see
# gunicorn.conf.py, when_ready). Both jobs only POST an empty body to this
# service's own idempotent endpoints, so moving them in-process removes two
# services with no behavior change. Toggle with INPROCESS_SCHEDULER (default
# on). The two former cron services should be deleted in the dashboard after
# the scheduler is confirmed running (blueprint re-sync won't delete them).
#
# Region: every service is pinned to `virginia` so the family is co-located
# with the web service's persistent disk (which can't move regions) and close
# to H&H's East-Coast ops + MS365 mailboxes.
#
# Runtime: Python is pinned via the repo's .python-version so builds are
# reproducible and don't silently drift when Render bumps its native-runtime
# default.
#
# Secrets (sync:false) are NOT carried in this file. Set them once on each
# service in the dashboard; Render preserves them across blueprint re-syncs.
# Only non-secret values (schedules, mailbox list, etc.) live here.

services:
  - type: web
    name: bagel-inventory
    runtime: python
    plan: starter
    branch: main
    region: virginia
    buildCommand: pip install -r requirements.txt
    # gunicorn.conf.py holds workers/threads/timeout/bind AND starts the
    # in-process scheduler once via its when_ready hook.
    startCommand: gunicorn -c gunicorn.conf.py app:app
    disk:
      name: inventory-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: INVENTORY_API_TOKEN
        sync: false
      # In-process scheduler on/off (default on). Set to "off" to disable the
      # daily forecast-decrement + Graph-renew jobs without a code change.
      - key: INPROCESS_SCHEDULER
        value: "on"
      - key: MS365_TENANT_ID
        sync: false
      - key: MS365_CLIENT_ID
        sync: false
      - key: MS365_CLIENT_SECRET
        sync: false
      - key: MS365_USER
        sync: false
      - key: MS365_FOLDER
        value: Inbox
      - key: PO_LEAD_DAYS
        value: "30"
      # Real-time Daily Production via Microsoft Graph change notifications.
      # GRAPH_WEBHOOK_BASE is the public HTTPS root of THIS service — Graph
      # POSTs new-message pings to <base>/webhooks/graph/notifications. The
      # client state is an arbitrary secret that Graph echoes back on every
      # call so the webhook can confirm the request is genuine.
      - key: GRAPH_WEBHOOK_BASE
        sync: false  # e.g. https://bagel-inventory.onrender.com
      - key: GRAPH_SUB_CLIENT_STATE
        sync: false  # any long random string; treat like a token

  - type: cron
    name: bagel-inventory-6h-scan
    runtime: python
    plan: starter
    branch: main
    region: virginia
    # Every 6 hours, on the hour (UTC). Runs at 00, 06, 12, 18 UTC every
    # day. Covers U.S. business hours year-round regardless of daylight
    # saving (a fixed UTC cron drifts an hour against local time twice a
    # year, which is fine for an order-ingestion scan).
    #
    # The cowork_graph_scan.py script talks to Microsoft Graph directly using
    # the same MS365_* client-credentials that the web service uses, fetches
    # PO PDFs from the JD@ and info@ mailboxes, parses them out-of-process,
    # and POSTs the parsed records to the web service:
    #   - US Foods + Cheney Brothers events -> /api/email/ingest-events
    #     (apply through the inventory on_order pipeline)
    #   - Chefs Warehouse records           -> /api/chefs-warehouse/ingest-pos
    #     (apply to the parallel data/chefs_warehouse_pos.json store; CW
    #     POs surface on the Pending POs tab but never touch the Inventory
    #     tab by design).
    # PO-revision idempotency in sync_inventory means re-scanning the same
    # message (or a stale revision) cannot double-count the on_order column;
    # the per-cron-container .cowork_seen_ids.txt is a nice-to-have
    # message-level shortcut but is not required for safety.
    #
    # This scan stays a SEPARATE cron on purpose: it does heavy outbound Graph
    # fetches and pypdf parsing (plus a 90-day Lineage sweep) that we don't
    # want running inside the web dyno. cowork_graph_scan.py imports
    # integrations.email_scanner (which pulls in pypdf), so the cron service
    # needs the full requirements.txt installed in its build.
    schedule: "0 */6 * * *"
    buildCommand: pip install -r requirements.txt
    # USF/Cheney/CW POs: 24h is plenty since the inbox refresh is fast and
    # the apply path is idempotent. Lineage Freight invoices are rarer
    # and arrive weeks after ship date, so we sweep a 90-day window for
    # those. The seen-state dedup keeps re-scans cheap.
    startCommand: python scripts/cowork_graph_scan.py --lookback-hours 24 --lineage-lookback-hours 2160
    envVars:
      - key: APP_URL
        sync: false  # set to https://<your-service>.onrender.com
      - key: INVENTORY_API_TOKEN
        sync: false
      - key: MS365_TENANT_ID
        sync: false
      - key: MS365_CLIENT_ID
        sync: false
      - key: MS365_CLIENT_SECRET
        sync: false
      - key: MAILBOXES
        value: JD@ms.hhbagels.com,info@ms.hhbagels.com
